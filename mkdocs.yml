      - 第1章 预训练的前史: chapters/llm_pretraining_sec01.md
      - 第2章 Transformer 改变底层结构: chapters/llm_pretraining_sec02.md
      - 第3章 GPT 路线: chapters/llm_pretraining_sec03.md
      - 第4章 BERT 路线: chapters/llm_pretraining_sec04.md
      - 第5章 T5、BART 与统一文本到文本: chapters/llm_pretraining_sec05.md
      - 第6章 Tokenizer 的核心问题: chapters/llm_pretraining_sec06.md
      - 第7章 BPE 到 Byte-level Tokenizer: chapters/llm_pretraining_sec07.md
      - 第8章 Tokenizer 的新问题: chapters/llm_pretraining_sec08.md
      - 第9章 Scaling Law 的提出: chapters/llm_pretraining_sec09.md
      - 第10章 GPT-3 与大模型涌现: chapters/llm_pretraining_sec10.md
      - 第11章 Chinchilla Scaling Law: chapters/llm_pretraining_sec11.md
      - 第12章 Scaling Law 的新阶段: chapters/llm_pretraining_sec12.md
      - 第13章 预训练数据的基本构成: chapters/llm_pretraining_sec13.md
      - 第14章 大规模语料堆叠阶段: chapters/llm_pretraining_sec14.md
      - 第15章 数据配比成为核心技术: chapters/llm_pretraining_sec15.md
