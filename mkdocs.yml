      - 第19章 3D 并行与千卡训练: chapters/llm_pretraining_sec19.md
      - 第20章 长上下文与高效 Attention: chapters/llm_pretraining_sec20.md
      - 第21章 新一代训练系统趋势: chapters/llm_pretraining_sec21.md
      - 第22章 MoE 稀疏激活模型: chapters/llm_pretraining_sec22.md
      - 第23章 Multi-token Prediction: chapters/llm_pretraining_sec23.md
